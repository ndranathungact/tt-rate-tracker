name: TT Rate Tracker

# Polls the HNB USD TT rate and pings the MacroDroid webhook when it changes.
#
# Cadence note:
#   */15 = every 15 minutes. On a PUBLIC repo, Actions minutes are unlimited
#   and free, so this costs nothing. If you make the repo PRIVATE, change this
#   to "*/30 * * * *" (every 30 min) to stay under the 2,000 free min/month.
#   GitHub's cron minimum is 5 minutes, and runs may be delayed 5-30 min at
#   peak times — fine here, since HNB only updates the rate a few times a day.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:        # lets you run it manually from the Actions tab
    inputs:
      force:
        description: "Post to the webhook even if the rate is unchanged"
        type: boolean
        default: false

# Never let two runs overlap (a delayed run + a fresh one).
concurrency:
  group: tt-rate
  cancel-in-progress: false

permissions:
  contents: write           # needed to commit the updated rate state back

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch rate and post to webhook
        env:
          MACRODROID_WEBHOOK_URL: ${{ secrets.MACRODROID_WEBHOOK_URL }}
          WEBHOOK_SHARED_SECRET: ${{ secrets.WEBHOOK_SHARED_SECRET }}
          WEBHOOK_METHOD: GET
          ALWAYS_POST: "false"
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python3 scrape.py --force
          else
            python3 scrape.py
          fi

      - name: Commit updated rate history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No rate change to commit."
          else
            git commit -m "chore: update HNB USD TT rate [skip ci]"
            git push
          fi
