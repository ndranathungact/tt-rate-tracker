name: TT Rate Tracker

# Polls the HNB USD TT rate and pings the MacroDroid webhook when it changes.
#
# Cadence note:
#   Runs every 15 minutes at :07 :22 :37 :52. This repo is PUBLIC, so Actions
#   minutes are unlimited and free — no monthly-minute budget to worry about.
#
#   The minutes are OFFSET (:07/:22/:37/:52) rather than :00/:15/:30/:45 on
#   purpose: the top and bottom of the hour are the most congested slots on
#   GitHub's shared scheduler, so runs there get delayed the most and are
#   sometimes dropped under load. Off-boundary minutes fire more reliably.
#
#   GitHub's cron minimum is 5 minutes; the `schedule` event is best-effort, so
#   expect occasional 5-30 min drift — fine here, since HNB only updates the rate
#   a few times per banking day. A brand-new scheduled workflow also often skips
#   its first one or two ticks before settling in (can take ~1 hour after push).
#
#   If you ever switch this repo back to PRIVATE, drop to "7,37 * * * *"
#   (every 30 min ≈ 1,440 min/month) to stay under the 2,000 free min/month.

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:        # lets you run it manually from the Actions tab
    inputs:
      force:
        description: "Post to the webhook even if the rate is unchanged"
        type: boolean
        default: false

# Never let two runs overlap (a delayed run + a fresh one).
concurrency:
  group: tt-rate
  cancel-in-progress: false

permissions:
  contents: write           # needed to commit the updated rate state back

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch rate and post to webhook
        env:
          MACRODROID_WEBHOOK_URL: ${{ secrets.MACRODROID_WEBHOOK_URL }}
          WEBHOOK_SHARED_SECRET: ${{ secrets.WEBHOOK_SHARED_SECRET }}
          WEBHOOK_METHOD: GET
          ALWAYS_POST: "false"
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python3 scrape.py --force
          else
            python3 scrape.py
          fi

      - name: Commit updated rate history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No rate change to commit."
          else
            git commit -m "chore: update HNB USD TT rate [skip ci]"
            git push
          fi
