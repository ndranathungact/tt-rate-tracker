name: TT Rate Tracker

# Polls the HNB USD TT rate, maintains a daily series + forecast, and notifies
# via MacroDroid push and/or HTML email when the BUY rate changes.
#
# Cadence note:
#   HNB sets this rate ~once per business day, in the morning (~04:00-05:00 UTC).
#   So there is no point polling 24x7 every 15 min. This runs every 20 minutes
#   between 03:00-13:59 UTC, Monday-Friday only (~08:30-19:30 SL time) — dense
#   enough to catch the daily change within ~20 min, ~0 waste on nights/weekends.
#
#   The REAL schedule is driven by cron-job.org (reliable) via workflow_dispatch;
#   see EXTERNAL_CRON_SETUP.md. This `schedule:` block is just a best-effort
#   GitHub fallback (often delayed/dropped on low-activity repos).

on:
  schedule:
    - cron: "*/20 3-13 * * 1-5"   # every 20 min, 03:00-13:59 UTC, Mon-Fri
  workflow_dispatch:              # primary trigger (cron-job.org) + manual button
    inputs:
      force:
        description: "Notify even if the rate is unchanged"
        type: boolean
        default: false

# Never let two runs overlap (a delayed run + a fresh one).
concurrency:
  group: tt-rate
  cancel-in-progress: false

permissions:
  contents: write           # needed to commit the updated data series back

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch rate, forecast, notify
        env:
          # --- MacroDroid channel (on; set NOTIFY_MACRODROID=false to disable) ---
          NOTIFY_MACRODROID: "false"
          MACRODROID_WEBHOOK_URL: ${{ secrets.MACRODROID_WEBHOOK_URL }}
          WEBHOOK_SHARED_SECRET: ${{ secrets.WEBHOOK_SHARED_SECRET }}
          WEBHOOK_METHOD: GET
          ALWAYS_POST: "false"
          # --- Email channel (flip to "true" AFTER adding the SMTP_* secrets) ---
          # Works with ANY SMTP provider — Gmail (465), or Brevo/Mailjet/SMTP2GO
          # (587). Just set SMTP_HOST/SMTP_PORT to match. See EMAIL_SETUP.md.
          NOTIFY_EMAIL: "true"          # flip to "true" once the 3 SMTP secrets exist
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "465"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_DAILY_DIGEST: "false"     # "true" = one summary email/day, even on flat days
          EMAIL_DAILY_AFTER_UTC: "05:30"   # only send signal/digest after the morning update settles
          # --- Predictions (optional second webhook; feedback loop always runs) ---
          PREDICTION_WEBHOOK_URL: ${{ secrets.PREDICTION_WEBHOOK_URL }}
          PREDICTION_NOTIFY_EVERY_RUN: "false"
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python3 scrape.py --force
          else
            python3 scrape.py
          fi

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nothing changed — no commit."
          else
            git commit -m "chore: update HNB USD TT rate + daily series [skip ci]"
            # Rebase on any concurrent bot push before pushing, to avoid rejects.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
